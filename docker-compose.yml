services:
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: enterprise-rag-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_rag}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-enterprise_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-backend:
    build: .
    container_name: rag-enterprise-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vector:5432/${POSTGRES_DB:-enterprise_rag}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-rag_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres-vector:
        condition: service_healthy

volumes:
  pgdata:
