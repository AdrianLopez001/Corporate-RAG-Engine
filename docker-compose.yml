version: '3.8'

services:
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: enterprise-rag-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: enterprise_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d enterprise_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-backend:
    build: .
    container_name: rag-enterprise-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vector:5432/enterprise_rag
      SPRING_DATASOURCE_USERNAME: rag_user
      SPRING_DATASOURCE_PASSWORD: rag_password
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres-vector:
        condition: service_healthy

volumes:
  pgdata:
